# ── Situational Awareness Tracker — configuration ─────────────────────────────
# All non-secret settings live here. Secrets (SMTP password, X API token) are
# read from environment variables only. See README §Configuration.

entity:
  person: "Leopold Aschenbrenner"
  primary_name: "Situational Awareness LP"
  # Authoritative SEC identifier (verified on EDGAR).
  primary_cik: "0002045724"
  # Additional CIKs to watch. Mark `confirmed: false` until verified — see
  # data/reference/entity_map.json and src/sources/entity_resolution.py.
  extra_ciks: []

sec:
  # SEC requires a descriptive User-Agent with contact info, and rate-limits to
  # ~10 requests/second. Put a real contact address here before running.
  user_agent: "situational-awareness-tracker (contact: your-email@example.com)"
  request_delay_seconds: 0.2          # ~5 req/s, comfortably under the limit
  filing_types: ["13F-HR", "13F-HR/A", "SC 13D", "SC 13D/A", "SC 13G", "SC 13G/A", "D", "D/A"]

analysis:
  # How many trailing 13F quarters to show in the position table.
  quarters: 3
  # Status thresholds for the Common Stock "Reported Position Change" traffic light.
  hold_band_pct: 0.10                 # |QoQ| <= 10% counts as "Hold"
  trim_threshold_pct: -0.10           # QoQ < -10% counts as "Trim"

llm:
  # Semantic validation of news signals via Claude Haiku.
  # Requires ANTHROPIC_API_KEY env var. Falls back to keyword-only if not set.
  validate_statements: true
  model: "claude-haiku-4-5-20251001"

prices:
  source: "yfinance"                  # "yfinance" with automatic "stooq" fallback
  enabled: true

email:
  enabled: true                       # SMTP_* env vars configured
  subject_prefix: "SA Tracker"
  from_name: "SA Tracker"
  # Recipients live in the SMTP_TO env var (comma-separated) — never commit addresses.

alert:
  # Immediate alert email sent when any new high-confidence event is detected.
  # Uses the same SMTP_* env vars as the digest. Set enabled: true to activate.
  enabled: true
  subject_prefix: "SA Alert"
  # Minimum event confidence (0–1) required to trigger an alert.
  # SEC-verified filings always have confidence 1.0.
  # News/media signals start at 0.45–0.85 depending on source.
  min_confidence: 0.5
  # Which signal types trigger an alert.
  on_signal_types:
    - "13f_position"       # new 13F quarterly filing
    - "ownership_13dg"     # 13D/G beneficial-ownership change
    - "public_statement"   # news / blog mention (invest, sell, announce, highlight)

paths:
  reference: "data/reference"
  raw: "data/raw"
  parsed: "data/parsed"
  derived: "data/derived"
  state: "data/state"
