name: entity-and-adv

# Entity resolution + (future) ADV/IAPD weekly — these change rarely.
on:
  schedule:
    - cron: "17 6 * * 1"    # Monday mornings
  workflow_dispatch:

permissions:
  contents: write

# Fix [L3]: add concurrency control (was the only workflow without it).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.pipeline resolve-entities
      - name: Commit updated data
        run: |
          git config user.name "sa-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "data: entity map $(date -u +%FT%TZ)"
          git pull --rebase origin main
          git push
