name: filings

# SEC EDGAR ingest every ~3 hours on weekdays to catch 13D/G filings quickly.
# 13D/G must be filed within 10 days — polling every 3h keeps latency under 3h.
# Weekend run kept (Saturday morning) to catch any Friday-evening EDGAR postings.
on:
  schedule:
    - cron: "17 6,9,12,15,18,21 * * 1-5"  # every 3h Mo-Fr (Berlin 07-23 CEST)
    - cron: "17 8 * * 6"                   # Saturday morning catch-up
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch + parse + analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
        run: |
          python -m src.pipeline fetch
          python -m src.pipeline analyze
      # Fix [H4]: send immediate alert after daily filing ingest so new 13F/13D events
      # are not delayed up to 55 min waiting for the next hourly alert.yml run.
      - name: Alert on new events
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python -m src.pipeline alert
      - name: Commit updated data
        run: |
          git config user.name "sa-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "data: filings $(date -u +%FT%TZ)"
          git pull --rebase origin main
          git push
