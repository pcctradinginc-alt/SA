name: filings

# SEC EDGAR ingest once daily (13F/13D/G/Form D appear at most a few times a year).
on:
  schedule:
    - cron: "17 21 * * *"   # ~22:17/23:17 Berlin — after the EDGAR day
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch + parse + analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m src.pipeline fetch
          python -m src.pipeline analyze
      # Fix [H4]: send immediate alert after daily filing ingest so new 13F/13D events
      # are not delayed up to 55 min waiting for the next hourly alert.yml run.
      - name: Alert on new events
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python -m src.pipeline alert
      - name: Commit updated data
        run: |
          git config user.name "sa-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "data: filings $(date -u +%FT%TZ)"
          git pull --rebase origin main
          git push
