name: filings

# SEC EDGAR ingest once daily (13F/13D/G/Form D appear at most a few times a year).
on:
  schedule:
    - cron: "17 21 * * *"   # ~22:17/23:17 Berlin — after the EDGAR day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch + parse + analyze
        run: |
          python -m src.pipeline fetch
          python -m src.pipeline analyze
      - name: Commit updated data
        run: |
          git config user.name "sa-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "data: filings $(date -u +%FT%TZ)"
          git pull --rebase origin main
          git push
