name: alert

# Runs every hour. Fetches curated news RSS + SEC filings, then sends an
# immediate alert email if new high-confidence signals are found.
# State (data/state/alert_state.json) is committed back so duplicate alerts
# are never sent across runs.
on:
  schedule:
    - cron: "12 * * * *"   # every hour at :12 past (stagger away from :00 bursts)
  workflow_dispatch:         # also triggerable manually from the Actions tab

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -r requirements.txt

      - name: Discover new signals
        env:
          GOOGLE_ALERT_FEEDS: ${{ secrets.GOOGLE_ALERT_FEEDS }}
          BLOG_FEEDS: ${{ secrets.BLOG_FEEDS }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python -m src.pipeline discover

      - name: Send alert if new events exist
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python -m src.pipeline alert

      - name: Commit updated state
        run: |
          git config user.name "sa-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/parsed/events.jsonl data/state/alert_state.json || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "data: alert-check $(date -u +%FT%TZ)"
          git pull --rebase origin main
          git push
