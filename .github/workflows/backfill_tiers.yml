name: backfill-signal-tiers

# One-shot: retroactively classify the 25 public_statement events that were
# created before the 3-tier LLM system was in place (signal_tier=None).
# Trigger manually once; delete this file afterwards or leave it — it is safe
# to re-run because already-validated events are skipped automatically.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Backfill signal tiers via LLM
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.pipeline backfill-tiers
      - name: Commit updated events
        run: |
          git config user.name "sa-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "data: backfill signal_tier for pre-LLM public_statement events"
          git pull --rebase origin main
          git push
